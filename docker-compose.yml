version: "3.9"

services:
  chatbot:
    image: ghcr.io/iflorido/nomadas-chatbot:latest
    container_name: nomadas-chatbot
    restart: unless-stopped
    ports:
      - "8018:8018"
    env_file:
      - /var/www/vhosts/nomadassurfpark.com/chat.nomadassurfpark.com/entorno/.env
    volumes:
      - /var/www/vhosts/nomadassurfpark.com/chat.nomadassurfpark.com/entorno/knowledge:/app/knowledge
    extra_hosts:
      - "host.docker.internal:host-gateway"